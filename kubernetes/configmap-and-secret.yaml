# ── Non-sensitive configuration ───────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: amazon-recommender-config
  namespace: production
data:
  GROQ_MODEL: "llama3-70b-8192"
  HF_EMBEDDING_MODEL: "sentence-transformers/all-MiniLM-L6-v2"
  ASTRA_DB_KEYSPACE: "amazon_rag"
  ASTRA_DB_COLLECTION: "products"
  TOP_K_RESULTS: "5"
  INGEST_BATCH_SIZE: "500"
  LOG_LEVEL: "info"
  CORS_ORIGINS: '["*"]'
---
# ── Sensitive credentials (base64-encoded values) ─────────────────────────────
# Create with:
#   kubectl create secret generic amazon-recommender-secrets \
#     --from-literal=GROQ_API_KEY=gsk_... \
#     --from-literal=ASTRA_DB_APPLICATION_TOKEN=AstraCS:... \
#     --from-literal=ASTRA_DB_API_ENDPOINT=https://...astra.datastax.com \
#     --namespace production
#
# DO NOT commit real credentials. This file is a template only.
apiVersion: v1
kind: Secret
metadata:
  name: amazon-recommender-secrets
  namespace: production
type: Opaque
stringData:
  GROQ_API_KEY: "REPLACE_ME"
  ASTRA_DB_APPLICATION_TOKEN: "REPLACE_ME"
  ASTRA_DB_API_ENDPOINT: "REPLACE_ME"
