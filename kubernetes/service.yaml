apiVersion: v1
kind: Service
metadata:
  name: amazon-recommender
  namespace: production
  labels:
    app: amazon-recommender
spec:
  type: ClusterIP
  selector:
    app: amazon-recommender
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
---
# Expose externally via Minikube NodePort (use: minikube service amazon-recommender-lb -n production)
apiVersion: v1
kind: Service
metadata:
  name: amazon-recommender-lb
  namespace: production
spec:
  type: NodePort
  selector:
    app: amazon-recommender
  ports:
    - name: http
      port: 80
      targetPort: 8000
      nodePort: 30080
